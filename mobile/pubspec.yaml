name: reshaqa
description: "رشاقة — تطبيق حساب السعرات والتغذية للتخسيس الصحي"
publish_to: 'none'
version: 1.6.7+14

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # الشبكة والحالة
  dio: ^5.7.0
  provider: ^6.1.2
  intl: ^0.20.2

  # التخزين الآمن والإعدادات
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # الإشعارات والمنبّهات (صوت حتى لو صامت — full-screen intent + exact alarm)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # مشاركة تقارير PDF
  share_plus: ^10.1.2
  path_provider: ^2.1.5

  # التحديث الذاتي (فحص الإصدار + فتح رابط التنزيل)
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1

  # الباركود والكاميرا و OCR
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0

  # القفل البيومتري والـ widget والرسوم
  local_auth: ^2.3.0
  home_widget: ^0.6.0
  fl_chart: ^0.69.0
  cupertino_icons: ^1.0.8

  # تسجيل الدخول بجوجل (مجاني — Google Identity، تبعية أصلية تتطلب إصدار جديد)
  google_sign_in: ^6.2.1

  # اشتراكات Google Play (تبعية أصلية — تتطلب إصدار AAB جديد)
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  assets:
    - shorebird.yaml
  uses-material-design: true
